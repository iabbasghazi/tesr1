<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghazi Abbas | Legend Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03050a; --card: rgba(12, 16, 24, 0.9); --pink: #ff007a; --blue: #00d2ff;
            --green: #00ff88; --yellow: #ffcc00; --text: #e0e6ed;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Poppins', sans-serif; background: var(--bg);
            color: var(--text); overflow-x: hidden; min-height: 100vh;
        }

        #snow { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
        .container { width: min(1500px, 96%); margin: auto; padding-bottom: 150px; }

        .header { padding: 60px 0 40px; text-align: center; }
        .brand h1 { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; 
            color: #fff; text-shadow: 0 0 20px var(--pink), 0 0 40px var(--pink);
            letter-spacing: -2px;
        }

        /* TIMER BOXES */
        .timer-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; }
        .year-block { background: var(--card); border-radius: 30px; padding: 25px; border: 2px solid rgba(0, 210, 255, 0.3); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .year-title { font-size: 2rem; font-weight: 800; margin-bottom: 20px; color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }
        .exams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .exam-box { background: #080b12; border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .exam-name { font-size: 0.85rem; font-weight: 800; margin-bottom: 10px; color: var(--blue); }
        .countdown { display: flex; justify-content: center; gap: 5px; }
        .unit { background: #131924; padding: 5px; border-radius: 8px; min-width: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .unit span { display: block; font-size: 1rem; font-weight: 800; color: #fff; }
        .unit label { font-size: 0.5rem; color: #777; }

        /* SUBJECT CARDS */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .col-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 30px; text-align: center; color: #fff; }
        .subject-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            padding: 25px; margin-bottom: 30px; position: relative; transition: 0.3s;
        }
        .subject-card:hover { border-color: var(--pink); box-shadow: 0 0 20px rgba(255, 0, 122, 0.2); }
        .subject-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sub-info h3 { font-size: 1.6rem; font-weight: 800; color: #fff; }
        
        .progress-circle { width: 70px; height: 70px; position: relative; }
        .progress-circle svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .progress-circle circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .progress-circle .bg { stroke: #1a202c; }
        .progress-circle .fg { stroke: var(--pink); transition: 1s ease; filter: drop-shadow(0 0 5px var(--pink)); }
        .percent { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; font-weight: 800; }

        .ch-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;
        }
        .weightage { font-size: 0.7rem; color: var(--yellow); margin-left: 10px; font-weight: 400; }
        .check { 
            width: 30px; height: 30px; border-radius: 8px; border: 2px solid #444; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .check.done { background: var(--green); border-color: var(--green); color: #000; box-shadow: 0 0 15px var(--green); }

        /* ANALYTICS POPUP */
        .ana-btn { position: fixed; right: 30px; bottom: 30px; width: 70px; height: 70px; border-radius: 20px; background: linear-gradient(45deg, var(--pink), var(--blue)); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; box-shadow: 0 0 20px var(--pink); font-size: 1.5rem; }
        .popup { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .popup-box { width: min(900px, 95%); background: #080b11; border-radius: 35px; padding: 40px; border: 2px solid var(--blue); box-shadow: 0 0 40px rgba(0, 210, 255, 0.2); }
        .ana-content { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .ana-inner { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        .mini-ring { width: 80px; height: 80px; margin: auto; position: relative; }
        .mini-ring .label-text { font-size: 0.7rem; font-weight: 700; color: #fff; margin-top: 10px; display: block; }

        #disclaimer { position: fixed; bottom: 0; width: 100%; background: #f00; color: #fff; padding: 10px 0; font-weight: 800; z-index: 999; }
        
        @media (max-width: 900px) { .timer-container, .main-grid, .ana-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>
<div class="container">
    <header class="header">
        <div class="brand"><h1>Ghazi Abbas 👑</h1></div>
    </header>

    <div class="timer-container">
        <div class="year-block">
            <div class="year-title">TARGET 2027</div>
            <div class="exams-grid">
                <div class="exam-box"><div class="exam-name">JEE Main Jan</div><div class="countdown" id="t1"></div></div>
                <div class="exam-box"><div class="exam-name">JEE Main Apr</div><div class="countdown" id="t2"></div></div>
                <div class="exam-box"><div class="exam-name">NEET (02 May)</div><div class="countdown" id="t4"></div></div>
                <div class="exam-box"><div class="exam-name">JEE Advanced</div><div class="countdown" id="t3"></div></div>
            </div>
        </div>
        <div class="year-block">
            <div class="year-title">TARGET 2028</div>
            <div class="exams-grid">
                <div class="exam-box"><div class="exam-name">JEE Main Jan</div><div class="countdown" id="t5"></div></div>
                <div class="exam-box"><div class="exam-name">JEE Main Apr</div><div class="countdown" id="t6"></div></div>
                <div class="exam-box"><div class="exam-name">NEET (07 May)</div><div class="countdown" id="t8"></div></div>
                <div class="exam-box"><div class="exam-name">JEE Advanced</div><div class="countdown" id="t7"></div></div>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div id="col11"><h2 class="col-title">CLASS 11TH</h2><div id="data11"></div></div>
        <div id="col12"><h2 class="col-title">CLASS 12TH</h2><div id="data12"></div></div>
    </div>

    <footer style="text-align:center; padding: 100px 0;">
        <a href="https://t.me/ghazi_abbas" style="color:var(--blue); font-weight:800; text-decoration:none; font-size: 1.2rem; text-shadow: 0 0 10px var(--blue);">JOIN TELEGRAM: @GHAZI_ABBAS</a>
    </footer>
</div>

<div class="ana-btn" onclick="openAna()">📊</div>

<div class="popup" id="pop">
    <div class="popup-box">
        <div style="text-align:right; cursor:pointer; font-size:1.5rem;" onclick="closeAna()">✕</div>
        <div class="ana-content">
            <div class="ana-inner">
                <h3 style="color:var(--blue); margin-bottom:20px; font-weight:800;">JEE ANALYSIS</h3>
                <div class="progress-row" id="j_ana" style="display:flex; justify-content:space-around;"></div>
            </div>
            <div class="ana-inner">
                <h3 style="color:var(--pink); margin-bottom:20px; font-weight:800;">NEET ANALYSIS</h3>
                <div class="progress-row" id="n_ana" style="display:flex; justify-content:space-around;"></div>
            </div>
        </div>
    </div>
</div>

<script>
// Weightage added: Q = Questions, % = Weightage
const DB = [
    { cls:'11th', sub:'Physics', ch:[
        {n:'Unit & Dimension', w:'2Q'}, {n:'Vectors & Kinematics', w:'3Q'}, {n:'Laws of Motion', w:'2Q'}, {n:'Work Power Energy', w:'2Q'},
        {n:'Rotational Motion', w:'3Q'}, {n:'Gravitation', w:'2Q'}, {n:'Thermodynamics', w:'3Q'}, {n:'Oscillations & Waves', w:'3Q'}
    ]},
    { cls:'11th', sub:'Maths', ch:[
        {n:'Sets & Functions', w:'5%'}, {n:'Trigonometry', w:'8%'}, {n:'Algebra', w:'15%'}, {n:'Coordinate Geometry', w:'12%'},
        {n:'Calculus (11th)', w:'6%'}, {n:'Statistics & Prob', w:'8%'}
    ]},
    { cls:'11th', sub:'Biology', ch:[
        {n:'Plant Kingdom', w:'4Q'}, {n:'Animal Kingdom', w:'4Q'}, {n:'Cell Structure', w:'5Q'}, {n:'Human Physiology', w:'12Q'},
        {n:'Plant Physiology', w:'8Q'}, {n:'Biomolecules', w:'3Q'}
    ]},
    { cls:'12th', sub:'Physics', ch:[
        {n:'Electrostatics', w:'3Q'}, {n:'Current Electricity', w:'3Q'}, {n:'Magnetism', w:'4Q'}, {n:'Optics', w:'4Q'},
        {n:'Modern Physics', w:'5Q'}, {n:'Semiconductors', w:'2Q'}
    ]},
    { cls:'12th', sub:'Maths', ch:[
        {n:'Calculus (12th)', w:'25%'}, {n:'Vectors & 3D', w:'15%'}, {n:'Matrices & Det', w:'10%'}, {n:'Probability', w:'8%'}
    ]},
    { cls:'12th', sub:'Biology', ch:[
        {n:'Genetics & Evol.', w:'15Q'}, {n:'Reproduction', w:'8Q'}, {n:'Biotech', w:'6Q'}, {n:'Ecology', w:'10Q'},
        {n:'Human Welfare', w:'5Q'}
    ]}
];

function render() {
    const c11 = document.getElementById('data11'), c12 = document.getElementById('data12');
    c11.innerHTML = ''; c12.innerHTML = '';
    
    DB.forEach(item => {
        let d = 0; item.ch.forEach((_, i) => { if(localStorage.getItem(item.cls+item.sub+i)) d++; });
        let p = Math.round((d/item.ch.length)*100);
        
        const card = document.createElement('div'); card.className = 'subject-card';
        card.innerHTML = `
            <div class="subject-head">
                <div class="sub-info"><h3>${item.sub}</h3></div>
                <div class="progress-circle">
                    <svg viewBox="0 0 80 80"><circle class="bg" cx="40" cy="40" r="35"/><circle class="fg" cx="40" cy="40" r="35" style="stroke-dasharray: 220; stroke-dashoffset: ${220-(220*p/100)}"/></svg>
                    <div class="percent">${p}%</div>
                </div>
            </div>
            <div class="ch-list">${item.ch.map((c, i) => {
                let k = item.cls+item.sub+i; let isD = localStorage.getItem(k);
                return `<div class="ch-item"><span>${c.n}<span class="weightage">(${c.w})</span></span><div class="check ${isD?'done':''}" onclick="tk('${k}')">${isD?'✓':''}</div></div>`
            }).join('')}</div>`;
        (item.cls==='11th') ? c11.appendChild(card) : c12.appendChild(card);
    });
}

function tk(k){ localStorage.getItem(k)?localStorage.removeItem(k):localStorage.setItem(k,'1'); render(); }

/* UPDATED TIMER LOGIC */
function setT(id, date) {
    const target = new Date(date).getTime();
    const update = () => {
        const diff = target - Date.now();
        if(diff < 0) { document.getElementById(id).innerHTML = "EXAM DAY!"; return; }
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById(id).innerHTML = `<div class="unit"><span>${d}</span><label>D</label></div><div class="unit"><span>${h}</span><label>H</label></div><div class="unit"><span>${m}</span><label>M</label></div><div class="unit"><span>${s}</span><label>S</label></div>`;
    };
    update(); setInterval(update, 1000);
}

// Fixed Dates
setT('t1','Jan 24, 2027 09:00:00'); setT('t2','Apr 06, 2027 09:00:00'); setT('t3','May 23, 2027 09:00:00'); setT('t4','May 02, 2027 14:00:00');
setT('t5','Jan 24, 2028 09:00:00'); setT('t6','Apr 06, 2028 09:00:00'); setT('t7','May 23, 2028 09:00:00'); setT('t8','May 07, 2028 14:00:00');

/* ANALYTICS WITH CIRCLES */
function openAna(){
    document.getElementById('pop').style.display='flex';
    const getP = (c, sub) => {
        let item = DB.find(x => x.cls === c && x.sub === sub);
        if(!item) return 0;
        let d = 0; item.ch.forEach((_,i) => { if(localStorage.getItem(c+sub+i)) d++; });
        return Math.round((d/item.ch.length)*100);
    };

    const ring = (p, label, color) => `
        <div class="mini-ring">
            <svg viewBox="0 0 80 80"><circle class="bg" cx="40" cy="40" r="35" stroke-width="8"/><circle cx="40" cy="40" r="35" stroke="${color}" stroke-width="8" fill="none" stroke-linecap="round" style="stroke-dasharray: 220; stroke-dashoffset: ${220-(220*p/100)}; transition:1s;"/></svg>
            <div class="percent" style="font-size:0.8rem;">${p}%</div>
            <span class="label-text">${label}</span>
        </div>`;

    document.getElementById('j_ana').innerHTML = ring(getP('11th','Maths'),'11th M','#00d2ff') + ring(getP('12th','Maths'),'12th M','#00d2ff');
    document.getElementById('n_ana').innerHTML = ring(getP('11th','Biology'),'11th B','#ff007a') + ring(getP('12th','Biology'),'12th B','#ff007a');
}
function closeAna(){ document.getElementById('pop').style.display='none'; }

/* SNOW */
const cvs = document.getElementById('snow'); const ctx = cvs.getContext('2d');
let particles = [];
function res(){ cvs.width=window.innerWidth; cvs.height=window.innerHeight; }
window.onresize=res; res();
class P { constructor(){ this.r(); } r(){ this.x=Math.random()*cvs.width; this.y=Math.random()*cvs.height; this.v=0.5+Math.random(); this.s=1+Math.random()*2; } u(){ this.y+=this.v; if(this.y>cvs.height)this.y=-10; } d(){ ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
for(let i=0;i<50;i++) particles.push(new P());
function ani(){ ctx.clearRect(0,0,cvs.width,cvs.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(ani); } ani();

render();
</script>
</body>
</html>
