<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghazi Abbas | Study Legend v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #050a18; --card: rgba(18, 24, 45, 0.9); --pink: #ff007a; --blue: #00d2ff;
            --green: #00ff88; --yellow: #ffcc00; --text: #f0f3f8; --purple: #9d50bb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .container { width: min(1500px, 96%); margin: auto; padding: 40px 0; }

        /* HEADER & NAME */
        .header { text-align: center; margin-bottom: 50px; }
        .brand h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800;
            background: linear-gradient(to right, #fff, var(--blue), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,0,122,0.5));
        }

        /* TIMERS */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 50px; }
        .y-box { background: var(--card); padding: 25px; border-radius: 30px; border-top: 4px solid var(--blue); text-align: center; }
        .exams-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .ex-card { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .count { display: flex; justify-content: center; gap: 5px; font-weight: 700; font-size: 0.9rem; color: var(--green); }

        /* SYMMETRIC MAIN CONTENT */
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .subject-card { 
            background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 30px;
            border-left: 6px solid var(--pink); transition: 0.3s;
        }
        .subject-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* PROGRESS CIRCLE */
        .p-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .circle { width: 70px; height: 70px; position: relative; }
        .circle svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .circle .bg { stroke: #1a202c; }
        .circle .fg { stroke: var(--green); transition: 1s; }
        .p-text { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 0.8rem; }

        /* CHAPTER LIST */
        .ch-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: rgba(255,255,255,0.03); margin-top: 8px; border-radius: 12px; 
            transition: 0.2s;
        }
        .check { width: 30px; height: 30px; border-radius: 10px; border: 2px solid #444; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .check.done { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 0 10px var(--green); }

        /* ANALYTICS POPUP */
        .ana-btn { position: fixed; right: 30px; bottom: 30px; width: 65px; height: 65px; border-radius: 50%; background: var(--pink); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; box-shadow: 0 0 20px var(--pink); font-size: 1.5rem; }
        .pop { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        
        .neon-wrap { position: relative; width: min(1100px, 95%); padding: 5px; overflow: hidden; border-radius: 35px; }
        .neon-wrap::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--blue), var(--pink), var(--yellow), transparent 40%);
            animation: rotateLine 3s linear infinite;
        }
        @keyframes rotateLine { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pop-box { position: relative; background: #0c1222; border-radius: 32px; padding: 35px; z-index: 1; }
        .grid-ana { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .ana-card { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .bold-txt { font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; display: block; }

        /* TELEGRAM ANIMATION */
        .tg-btn { 
            display: inline-block; padding: 15px 40px; background: #229ED9; color: white; 
            text-decoration: none; border-radius: 50px; font-weight: 800; margin-top: 50px;
            box-shadow: 0 0 20px #229ED9; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* GIFT POPUP */
        #gift-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; text-align: center; }
        .gift-content { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        .gift-box { padding: 40px; background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d); border-radius: 40px; border: 5px solid #fff; }
        .close-gift { margin-top: 20px; padding: 10px 30px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

        @media (max-width: 900px) { .main-layout, .timer-grid, .grid-ana { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="brand"><h1>GHAZI ABBAS <span style="font-size: 2rem;">✔️</span></h1></div>
    </header>

    <div class="timer-grid">
        <div class="y-box"><h2>2027</h2><div class="exams-row" id="t27"></div></div>
        <div class="y-box"><h2>2028</h2><div class="exams-row" id="t28"></div></div>
    </div>

    <div class="main-layout">
        <div id="col11"><h2 style="text-align:center; margin-bottom:20px; color:var(--blue);">11TH STANDARD</h2><div id="data11"></div></div>
        <div id="col12"><h2 style="text-align:center; margin-bottom:20px; color:var(--pink);">12TH STANDARD</h2><div id="data12"></div></div>
    </div>

    <div style="text-align: center;">
        <a href="https://t.me/ghazi_abbas" class="tg-btn">JOIN TELEGRAM: @GHAZI_ABBAS</a>
    </div>
</div>

<div class="ana-btn" onclick="openAna()">📊</div>
<div class="pop" id="pop">
    <div class="neon-wrap">
        <div class="pop-box">
            <div style="position:absolute; top:20px; right:20px; cursor:pointer;" onclick="closeAna()">❌</div>
            <div class="grid-ana">
                <div class="ana-card">
                    <span class="bold-txt" style="color:var(--blue)">JEE MAIN / ADVANCED</span>
                    <div id="jee-p"></div>
                </div>
                <div class="ana-card">
                    <span class="bold-txt" style="color:var(--pink)">NEET (MEDICAL)</span>
                    <div id="neet-p"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="gift-modal">
    <div class="gift-content">
        <div class="gift-box">
            <h1 id="gift-title" style="font-size: 3.5rem; color:#fff; text-shadow: 0 5px 15px #000;">CONGRATS!</h1>
            <p id="gift-msg" style="font-size: 1.5rem; color:#fff; margin: 20px 0; font-weight: 700;"></p>
            <div id="college-tag" style="background:#fff; color:#000; padding:15px; border-radius:15px; font-size:2rem; font-weight:900;"></div>
            <button class="close-gift" onclick="closeGift()">CLOSE & PARTY 🥳</button>
        </div>
    </div>
</div>

<script>
// Syllabus with Weightage Data
const SYLLABUS = [
    { cls:'11th', sub:'Physics', weight: '33%', ch:['Unit & Dimension','Vectors','Motion 1D','NLM','Work','Rotation','Thermodynamics','Waves','Gravitation'] },
    { cls:'11th', sub:'Maths', weight: '33%', ch:['Basic Math','Sets','Trigo','Quadratic','P&C','Binomial','Straight Lines','Circles','Probability'] },
    { cls:'11th', sub:'Biology', weight: '50%', ch:['Cell','Living World','Plant Kingdom','Morphology','Photosynthesis','Plant Respiration','Digestion','Circulation'] },
    { cls:'12th', sub:'Physics', weight: '33%', ch:['Electrostatics','Current','Magnetism','EMI','AC','Ray Optics','Wave Optics','Atoms','Semiconductors'] },
    { cls:'12th', sub:'Maths', weight: '33%', ch:['Matrices','Inverse Trigo','Calculus','Integration','Vectors','3D Geometry','Probability'] },
    { cls:'12th', sub:'Biology', weight: '50%', ch:['Reproduction','Genetics','Evolution','Human Health','Ecosystem','Biotechnology'] },
    { cls:'11th', sub:'Chemistry', weight: '34%', ch:['Mole','Atomic','Periodic','Bonding','Thermodynamics','Equilibrium','GOC'] },
    { cls:'12th', sub:'Chemistry', weight: '34%', ch:['Solutions','Kinetics','Electrochem','Coordination','Organic Compounds','Biomolecules'] }
];

function render() {
    const c11 = document.getElementById('data11'), c12 = document.getElementById('data12');
    c11.innerHTML = ''; c12.innerHTML = '';
    
    SYLLABUS.forEach(item => {
        let done = 0; item.ch.forEach((_, i) => { if(localStorage.getItem(item.cls+item.sub+i)) done++; });
        let p = Math.round((done/item.ch.length)*100);
        
        const card = document.createElement('div'); card.className = 'subject-card';
        card.innerHTML = `
            <div class="p-wrap">
                <div><h3>${item.sub}</h3><small style="color:var(--yellow)">Exam Weightage: ${item.weight}</small></div>
                <div class="circle">
                    <svg viewBox="0 0 80 80"><circle class="bg" cx="40" cy="40" r="35"/><circle class="fg" cx="40" cy="40" r="35" style="stroke-dasharray: 220; stroke-dashoffset: ${220-(220*p/100)}"/></svg>
                    <div class="p-text">${p}%</div>
                </div>
            </div>
            <div class="ch-list">${item.ch.map((n, i) => {
                let k = item.cls+item.sub+i; let isD = localStorage.getItem(k);
                return `<div class="ch-item"><span>${n}</span><div class="check ${isD?'done':''}" onclick="tk('${k}', '${item.sub}', ${p})">${isD?'✓':''}</div></div>`;
            }).join('')}</div>`;
        (item.cls==='11th') ? c11.appendChild(card) : c12.appendChild(card);
    });
}

function tk(k, sub, currentP) {
    if(!localStorage.getItem(k)) {
        localStorage.setItem(k, '1');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); // Celebration
    } else {
        localStorage.removeItem(k);
    }
    render();
    checkMilestone(sub);
}

function checkMilestone(sub) {
    // Check if any subject reached 100%
    SYLLABUS.forEach(item => {
        let done = 0; item.ch.forEach((_, i) => { if(localStorage.getItem(item.cls+item.sub+i)) done++; });
        if(done === item.ch.length && !localStorage.getItem('gift_'+item.cls+item.sub)) {
            showGift(item.sub);
            localStorage.setItem('gift_'+item.cls+item.sub, 'done');
        }
    });
}

function showGift(sub) {
    const modal = document.getElementById('gift-modal');
    const msg = document.getElementById('gift-msg');
    const tag = document.getElementById('college-tag');
    modal.style.display = 'flex';
    
    if(sub === 'Biology') {
        msg.innerText = "FUTURE DOCTOR! YOU KILLED IT.";
        tag.innerText = "WELCOME TO AIIMS DELHI 🏥";
    } else {
        msg.innerText = "FUTURE ENGINEER! ABSOLUTE LEGEND.";
        tag.innerText = "WELCOME TO IIT BOMBAY 🎓";
    }
    
    let duration = 5 * 1000; let end = Date.now() + duration;
    (function frame() {
        confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

function closeGift() { document.getElementById('gift-modal').style.display='none'; }

// Timer Logic
function initTimers() {
    const exams = ['JEE Main 1','JEE Main 2','JEE Advance','NEET UG'];
    const d27 = ['2027-01-20','2027-04-05','2027-05-24','2027-05-07'];
    const d28 = ['2028-01-20','2028-04-05','2028-05-24','2028-05-07'];
    
    const fill = (cid, dates) => {
        const el = document.getElementById(cid);
        exams.forEach((n, i) => {
            const id = cid + i;
            el.innerHTML += `<div class="ex-card"><div style="font-size:0.7rem; color:var(--blue)">${n}</div><div class="count" id="${id}"></div></div>`;
            setInterval(() => {
                const diff = new Date(dates[i]) - new Date();
                const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
                document.getElementById(id).innerHTML = `${d}D : ${h}H : ${m}M`;
            }, 1000);
        });
    }
    fill('t27', d27); fill('t28', d28);
}

function openAna() {
    document.getElementById('pop').style.display='flex';
    const getP = (c, subs) => {
        let t=0, d=0; SYLLABUS.filter(x=>x.cls===c && subs.includes(x.sub)).forEach(s=>{ s.ch.forEach((_,i)=>{ t++; if(localStorage.getItem(s.cls+s.sub+i)) d++; }); });
        return Math.round((d/t)*100)||0;
    };
    
    const row = (label, p, color) => `
        <div style="margin-bottom:15px; text-align:left;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <b style="color:${color}">${label}</b><b>${p}%</b>
            </div>
            <div style="width:100%; height:10px; background:#222; border-radius:10px;">
                <div style="width:${p}%; height:100%; background:${color}; border-radius:10px; transition:1s;"></div>
            </div>
        </div>`;

    document.getElementById('jee-p').innerHTML = row('11th Syllabus', getP('11th',['Maths','Physics','Chemistry']), 'var(--blue)') + row('12th Syllabus', getP('12th',['Maths','Physics','Chemistry']), 'var(--green)');
    document.getElementById('neet-p').innerHTML = row('11th Syllabus', getP('11th',['Biology','Physics','Chemistry']), 'var(--pink)') + row('12th Syllabus', getP('12th',['Biology','Physics','Chemistry']), 'var(--purple)');
}

function closeAna() { document.getElementById('pop').style.display='none'; }

initTimers();
render();
</script>
</body>
</html>
